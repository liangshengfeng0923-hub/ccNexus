services:
  ccnexus-dev:
    build:
      context: ..
      dockerfile: docker-debug/Dockerfile
    container_name: ccnexus-dev
    # 不要 restart，避免容器异常退出后自动重启干扰调试
    ports:
      - "3021:3000"
    volumes:
      # 源码映射（可写）
      - ..:/app
      # 数据目录映射（数据库文件持久化）
      - ./ccnexus-data:/data
    environment:
      - CCNEXUS_PORT=3000
      - CCNEXUS_DATA_DIR=/data
      - CCNEXUS_DB_PATH=/data/ccnexus.db
      - TZ=Asia/Shanghai
      - GO111MODULE=on
      - GOPROXY=https://goproxy.cn,direct